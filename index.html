<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Friends Clicker: EVO V3.8 + ABILITIES</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; user-select: none; touch-action: manipulation; }
        #user-info { position: fixed; top: 10px; left: 10px; background: #1a1a1a; padding: 10px; border-radius: 8px; border: 1px solid #444; font-size: 14px; z-index: 100; }
        #leaderboard-btn { position: fixed; top: 10px; right: 10px; background: #f1c40f; color: black; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; z-index: 100; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 10000; }
        .modal-content { background: #181818; padding: 30px; border-radius: 20px; border: 2px solid #444; text-align: center; width: 320px; }
        .modal input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: 1px solid #444; background: #222; color: white; box-sizing: border-box; }
        .modal button { background: #2ecc71; border: none; padding: 10px 20px; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; }
        .leaderboard-list { text-align: left; margin-top: 15px; max-height: 300px; overflow-y: auto; }
        .lb-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #333; font-size: 14px; }
        .lb-item.me { color: #f1c40f; font-weight: bold; background: rgba(241, 196, 15, 0.1); }
        .hud { background: #111; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; width: 340px; border: 2px solid #444; margin-top: 50px; }
        .stats { font-size: 36px; color: #ffd700; font-weight: bold; }
        #click-button { width: 160px; height: 160px; border-radius: 50%; border: none; background: radial-gradient(circle, #2ecc71, #27ae60); color: white; font-size: 24px; font-weight: bold; cursor: pointer; box-shadow: 0 8px #145a32; transition: 0.05s; margin: 10px 0; outline: none; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        #click-button:active { transform: translateY(4px); box-shadow: 0 2px #145a32; }
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 360px; margin-bottom: 20px; }
        .chest-card { background: #1a1a1a; border: 2px solid #333; border-radius: 10px; padding: 10px; display: flex; flex-direction: column; align-items: center; transition: 0.2s; }
        .chest-card button { width: 100%; padding: 8px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 12px; margin-top: 5px; color: white; }
        .chest-card button:disabled { opacity: 0.5; cursor: default; }
        .chest-title { font-size: 11px; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        .c-worst { border-color: #4d2a00; } .c-worst button { background: #633900; }
        .c-cheap { border-color: #7f8c8d; } .c-cheap button { background: #95a5a6; }
        .c-mid { border-color: #2980b9; } .c-mid button { background: #3498db; }
        .c-good { border-color: #8e44ad; } .c-good button { background: #9b59b6; }
        .c-best { border-color: #d35400; } .c-best button { background: #e67e22; }
        .c-legend { border-color: #f1c40f; box-shadow: 0 0 10px rgba(241,196,15,0.3); } .c-legend button { background: #f1c40f; color: black; }
        #log { margin: 10px 0; color: #00ffcc; font-weight: bold; height: 20px; text-transform: uppercase; font-size: 14px; }
        .inventory { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 100%; padding-bottom: 50px; }
        .card { width: 120px; background: #181818; border-radius: 8px; border: 2px solid #333; overflow: hidden; position: relative; font-size: 12px; }
        .card-count { position: absolute; top: 3px; right: 3px; background: #f1c40f; color: black; padding: 1px 5px; border-radius: 5px; font-weight: bold; font-size: 10px; z-index: 5; }
        .card-img { width: 100%; height: 90px; object-fit: cover; background: #222; }
        .card-info { padding: 8px; text-align: center; }
        .card-name { font-size: 11px; height: 26px; overflow: hidden; font-weight: bold; line-height: 1.1; display: flex; align-items: center; justify-content: center; }
        .card-mult { font-size: 18px; font-weight: bold; color: #00ffcc; margin: 3px 0; }
        .card-desc { font-size: 9px; color: #888; height: 34px; overflow: hidden; line-height: 1.1; margin-bottom: 5px; }
        .negative { color: #ff4d4d !important; }
        .del-btn { width: 100%; padding: 6px; border: none; cursor: pointer; font-size: 9px; border-radius: 3px; font-weight: bold; }
        .del-free { background: #34495e; color: white; }
        .del-paid { background: #c0392b; color: white; }
        .phonkdary { border-color: #ff003c; box-shadow: 0 0 15px #ff003c; animation: phonk-glow 1s infinite alternate; }
        @keyframes phonk-glow { from { box-shadow: 0 0 5px #ff003c; } to { box-shadow: 0 0 20px #ff003c; } }
        .mythic { border-color: #ff00ff; }
        .legendary { border-color: #f1c40f; }
        .epic { border-color: #9b59b6; }
        .rare { border-color: #3498db; }
        .common { border-color: #7f8c8d; }
        .floating-amt { position: fixed; pointer-events: none; font-weight: bold; font-size: 24px; animation: fly 0.6s forwards; z-index: 1000; }
        @keyframes fly { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-80px); } }
    </style>
</head>
<body>

    <div id="user-info">Игрок: <span id="user-display">---</span></div>
    <button id="leaderboard-btn" onclick="toggleLeaderboard()">🏆 ТОП</button>

    <div id="reg-modal" class="modal">
        <div class="modal-content">
            <h2>ВХОД</h2>
            <input type="text" id="nickname-input" placeholder="Твой ник..." maxlength="12">
            <button onclick="register()">ПОГНАЛИ</button>
        </div>
    </div>

    <div id="lb-modal" class="modal" onclick="toggleLeaderboard()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2>ТОП 10 ОНЛАЙН</h2>
            <div class="leaderboard-list" id="lb-list">...</div>
            <br><button onclick="toggleLeaderboard()" style="background:#444">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div class="hud">
        <div class="stats"><span id="coins">0</span> 💰</div>
        <div style="color:#00ffcc">Сила клика: x<span id="mult">1.00</span></div>
        <div id="auto-stats" style="font-size: 12px; color: #888;">Авто-добыча: 0/сек</div>
    </div>
    
    <button id="click-button">КЛИК!</button>

    <div id="log">УДАЧНОЙ ОХОТЫ!</div>

    <div class="shop-grid" id="shop-grid"></div>

    <div class="inventory" id="inventory"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCBrATV-dAgbzWPI-cfpmdpvWtU1rNLpvs",
            authDomain: "clicker-d5776.firebaseapp.com",
            projectId: "clicker-d5776",
            databaseURL: "https://clicker-d5776-default-rtdb.europe-west1.firebasedatabase.app/",
            storageBucket: "clicker-d5776.firebasestorage.app",
            messagingSenderId: "244387249021",
            appId: "1:244387249021:web:d4ca38685bafd73c39ea14"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = localStorage.getItem('fcu_current_user') || "";
        let coins = 0;
        let characters = [];
        let multiplier = 1.0;
        let discountRate = 0; // Скидка на сундуки
        let currentAudio = null;

        const SOUNDS = { 
            click: 'click.mp3.mp3', common: 'common.mp3.mp3', rare: 'rare.mp3.mp3', 
            epic: 'epic.mp3.mp3', legendary: 'legendary.mp3.mp3', mythic: 'mythic.mp3.mp3',
            phonkdary: 'phonk.mp3.mp3'
        };

       const POOL = [
    { name: "Соволій", rarity: "phonkdary", mult: 5.0, desc: "😎😎😎", img: "sava.png", pType: "auto", pVal: 10 },
    { name: "Максим Романенко", rarity: "legendary", mult: 2.0, desc: "Абсолютный жир!", img: "max.png", pType: "percent", pVal: 0.05 },
    { name: "ТЕНЬ МАКСИМА", rarity: "legendary", mult: 0.2, desc: "ШАДОУ ГДЕ ПАЧКА?", img: "shadow.png", pType: "auto", pVal: -1 },
    { name: "Полина Скрипник", rarity: "epic", mult: 1.5, desc: "высоко.", img: "polina.png", pType: "crit", pVal: 10 },
    { name: "Павленко Каролина", rarity: "epic", mult: 0.5, desc: "Пизда или нормалды?", img: "karolina.png", pType: "chaos", pVal: 2 },
    { name: "Рыженко Артём", rarity: "rare", mult: 1.3, desc: "точе мастер.", img: "artyom.png", pType: "sale", pVal: 0.02 },
    { name: "Чумак Мирослав", rarity: "rare", mult: 1.2, desc: "Диктатор.", img: "miroslav.png", pType: "auto", pVal: 1 },
    { name: "Матвей Бруснецов", rarity: "common", mult: 1.1, desc: "бонус.", img: "matvey.png", pType: "auto", pVal: 0.2 },
    { name: "Негатив Матвей", rarity: "common", mult: 0.8, desc: "Чисто для баланса.", img: "boring.png", pType: "auto", pVal: -0.1 },
    { name: "Ренат Мамедов", rarity: "common", mult: 1.05, desc: "норм чел", img: "renat.png", pType: "auto", pVal: 0.1 },
    { name: "Давид Стариченко", rarity: "mythic", mult: 1.8, desc: "Старый-Молодой.", img: "david.png", pType: "find", pVal: 40 },
    { name: "Назар Кицюк", rarity: "mythic", mult: 1.9, desc: "Омайгарыбал!", img: "nazar.png", pType: "find", pVal: 50 },
    { name: "Ваня Пироженко", rarity: "legendary", mult: 2.5, desc: "Ваня жирный говноед", img: "vanya.png", pType: "auto", pVal: -0.5 },
    { name: "Миша Герасименко", rarity: "rare", mult: 1.25, desc: "Просто даун", img: "misha.png", pType: "auto", pVal: 0.5 },
    { name: "Арсений Москалець", rarity: "mythic", mult: 1.7, desc: "Пузата хата.", img: "Arseniy.png", pType: "percent", pVal: 0.03 },
    { name: "Катя Ушакова", rarity: "phonkdary", mult: 4.0, desc: "Королева крутости", img: "katya.png", pType: "buff", pVal: 2 },
    { name: "Зорин Глеб", rarity: "phonkdary", mult: 2.5, desc: "Очкорик в жопе шарик", img: "zorin.png", pType: "buff", pVal: 2 }
];

        const CHESTS = [
            { id: 'worst', name: 'Ужасный', basePrice: 40, class: 'c-worst', luck: [80, 15, 4, 1, 0, 0] },
            { id: 'cheap', name: 'Дешевый', basePrice: 150, class: 'c-cheap', luck: [60, 30, 8, 1.5, 0.5, 0] },
            { id: 'mid', name: 'Средний', basePrice: 500, class: 'c-mid', luck: [35, 45, 15, 3, 1.5, 0.5] },
            { id: 'good', name: 'Хороший', basePrice: 2000, class: 'c-good', luck: [15, 35, 35, 10, 4, 1] },
            { id: 'best', name: 'Лучший', basePrice: 10000, class: 'c-best', luck: [5, 15, 30, 25, 20, 5] },
            { id: 'legend', name: 'Легенда', basePrice: 50000, class: 'c-legend', luck: [0, 0, 10, 35, 35, 20] }
        ];

        function playSound(type) { 
            if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
            currentAudio = new Audio(SOUNDS[type] || SOUNDS.click);
            currentAudio.play().catch(() => {}); 
        }

        function register() {
            const input = document.getElementById('nickname-input').value.trim();
            if (input.length < 2) return alert("Ник короткий!");
            currentUser = input;
            localStorage.setItem('fcu_current_user', currentUser);
            document.getElementById('reg-modal').style.display = 'none';
            loadUserData();
        }

        function loadUserData() {
            if (!currentUser) return;
            document.getElementById('user-display').innerText = currentUser;
            db.ref('players/' + currentUser).once('value', (snap) => {
                if (snap.exists()) {
                    const data = snap.val();
                    coins = data.coins || 0;
                    characters = data.characters || [];
                }
                calculatePower();
                updateUI();
            });
        }

        function save() {
            if (!currentUser) return;
            db.ref('players/' + currentUser).update({
                name: currentUser, coins: Math.floor(coins),
                characters: characters, lastSeen: Date.now()
            });
        }

        function calculatePower() {
            if (characters.length === 0) {
                multiplier = 1.0; discountRate = 0;
                return;
            }
            let base = 1.0;
            let bonus = 0;
            let penaltyMult = 1.0;
            let commonBuff = 1.0;

            // Сначала ищем глобальные баффы (Катя)
            characters.forEach(h => { if(h.pType === 'buff') commonBuff = h.pVal; });

            characters.forEach(h => {
                let m = h.mult;
                if (h.rarity === 'common') m *= commonBuff;

                if (m >= 1) bonus += (m - 1);
                else penaltyMult *= m;
            });

            multiplier = (base + bonus) * penaltyMult;
            if (multiplier < 0.01) multiplier = 0.01;

            // Считаем скидку
            discountRate = characters.filter(h => h.pType === 'sale').reduce((s, h) => s + h.pVal, 0);
            if (discountRate > 0.8) discountRate = 0.8; // Макс скидка 80%
        }

        function updateUI() {
            document.getElementById('coins').innerText = Math.floor(coins).toLocaleString();
            document.getElementById('mult').innerText = multiplier.toFixed(2);
            
            const shop = document.getElementById('shop-grid');
            shop.innerHTML = CHESTS.map(c => {
                const rawPrice = Math.floor(c.basePrice * Math.pow(1.16, characters.length));
                const finalPrice = Math.floor(rawPrice * (1 - discountRate));
                const canAfford = coins >= finalPrice;
                return `
                    <div class="chest-card ${c.class}">
                        <div class="chest-title">${c.name}</div>
                        <button onclick="buyChest('${c.id}', ${finalPrice})" ${canAfford ? '' : 'disabled'}>
                            ${finalPrice.toLocaleString()} 💰
                        </button>
                    </div>
                `;
            }).join('');

            // Обновление инфы об автоклике
            let autoSec = 0;
            characters.forEach(h => {
                if(h.pType === 'auto') autoSec += h.pVal;
            });
            document.getElementById('auto-stats').innerText = `Авто-добыча: ${(autoSec * multiplier).toFixed(1)}/сек`;

            renderInv();
        }

        // Интервал автокликера
        setInterval(() => {
            if (!currentUser || characters.length === 0) return;
            let secIncome = 0;
            characters.forEach(h => {
                if (h.pType === 'auto') secIncome += h.pVal;
                if (h.pType === 'chaos') secIncome += (Math.random() > 0.5 ? h.pVal : -h.pVal);
            });
            
            if (secIncome !== 0) {
                coins += (secIncome * multiplier);
                if (coins < 0) coins = 0;
                updateUI();
            }
        }, 1000);

        document.getElementById('click-button').onpointerdown = (e) => {
            if(!currentUser) return;
            e.preventDefault(); 
            new Audio(SOUNDS.click).play().catch(() => {});
            
            let clickMult = multiplier;
            let isCrit = false;

            // Проверка способностей при клике
            characters.forEach(h => {
                if (h.pType === 'crit' && Math.random() < 0.05) { clickMult *= h.pVal; isCrit = true; }
                if (h.pType === 'find' && Math.random() < 0.03) { coins += h.pVal; showLog("КЛАД! +"+h.pVal); }
            });

            const earn = 1 * clickMult;
            coins += earn;
            const posX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const posY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            showFloat(posX, posY, earn.toFixed(1), isCrit);
            updateUI();
            save();
        };

        function buyChest(id, price) {
            if (coins >= price) {
                coins -= price;
                const config = CHESTS.find(c => c.id === id);
                openChest(config.luck);
                updateUI();
            }
        }

        function openChest(luckArray) {
            const rand = Math.random() * 100;
            let rarity;
            if (rand < luckArray[0]) rarity = "common";
            else if (rand < luckArray[0] + luckArray[1]) rarity = "rare";
            else if (rand < luckArray[0] + luckArray[1] + luckArray[2]) rarity = "epic";
            else if (rand < luckArray[0] + luckArray[1] + luckArray[2] + luckArray[3]) rarity = "legendary";
            else if (rand < luckArray[0] + luckArray[1] + luckArray[2] + luckArray[3] + luckArray[4]) rarity = "mythic";
            else rarity = "phonkdary";

            playSound(rarity);
            const available = POOL.filter(h => h.rarity === rarity);
            const hero = available[Math.floor(Math.random() * available.length)];
            characters.push({ ...hero, instanceId: Date.now() + Math.random() });
            calculatePower();
            showLog(`ВЫПАЛ: ${hero.name}!`);
            save();
        }

        function removeAllOfKind(name, isNerf) {
            const price = isNerf ? Math.max(500, Math.floor(coins * 0.2)) : 0;
            if (coins >= price) {
                coins -= price;
                characters = characters.filter(h => h.name !== name);
                calculatePower();
                updateUI();
                save();
            }
        }

        function renderInv() {
            const invEl = document.getElementById('inventory');
            const groups = {};
            characters.forEach(h => {
                if (!groups[h.name]) groups[h.name] = { ...h, count: 0 };
                groups[h.name].count++;
            });
            invEl.innerHTML = Object.values(groups).map(h => {
                const isNerf = h.mult < 1;
                const fPrice = Math.max(500, Math.floor(coins * 0.2));
                return `
                <div class="card ${h.rarity}">
                    ${h.count > 1 ? `<div class="card-count">x${h.count}</div>` : ''}
                    <img src="${h.img}" class="card-img" onerror="this.src='https://via.placeholder.com/100?text=FRIEND'">
                    <div class="card-info">
                        <div class="card-name">${h.name}</div>
                        <div class="card-mult ${isNerf ? 'negative' : ''}">x${h.mult}</div>
                        <div class="card-desc">${h.desc}</div>
                        <button class="del-btn ${isNerf ? 'del-paid' : 'del-free'}" onclick="removeAllOfKind('${h.name}', ${isNerf})">
                            ${isNerf ? `УБРАТЬ (${fPrice.toLocaleString()})` : 'ВЫГНАТЬ'}
                        </button>
                    </div>
                </div>`;
            }).join('');
        }

        function toggleLeaderboard() {
            const modal = document.getElementById('lb-modal');
            const isVisible = modal.style.display === 'flex';
            modal.style.display = isVisible ? 'none' : 'flex';
            if (!isVisible) {
                db.ref('players').orderByChild('coins').limitToLast(10).once('value', (snap) => {
                    let players = [];
                    snap.forEach(c => { players.push(c.val()); });
                    players.sort((a,b) => b.coins - a.coins);
                    document.getElementById('lb-list').innerHTML = players.map((p, i) => `
                        <div class="lb-item ${p.name === currentUser ? 'me' : ''}">
                            <span>${i+1}. ${p.name}</span>
                            <span>${Math.floor(p.coins).toLocaleString()} 💰</span>
                        </div>
                    `).join('');
                });
            }
        }

        function showLog(m) { 
            const logEl = document.getElementById('log');
            logEl.innerText = m; 
            setTimeout(() => { if(logEl.innerText === m) logEl.innerText = "УДАЧНОЙ ОХОТЫ!"; }, 2000);
        }

        function showFloat(x,y,t, crit) {
            const e = document.createElement('div'); 
            e.className = 'floating-amt'; 
            e.innerText = crit ? `CRIT +${t}` : `+${t}`;
            e.style.left = x+'px'; e.style.top = y+'px';
            e.style.color = crit ? "#ff003c" : "#ffd700";
            if(crit) e.style.fontSize = "32px";
            document.body.appendChild(e);
            setTimeout(() => e.remove(), 600);
        }

        window.onload = () => currentUser ? loadUserData() : document.getElementById('reg-modal').style.display='flex';
    </script>
</body>
</html>
