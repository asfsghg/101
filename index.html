<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friends Clicker: EVO V3 FULL + ONLINE UI</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; user-select: none; }
        
        /* --- НОВЫЕ СТИЛИ ДЛЯ АККАУНТА И ЛИДЕРБОРДА --- */
        #user-info { position: fixed; top: 10px; left: 10px; background: #1a1a1a; padding: 10px; border-radius: 8px; border: 1px solid #444; font-size: 14px; }
        #leaderboard-btn { position: fixed; top: 10px; right: 10px; background: #f1c40f; color: black; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 10000; }
        .modal-content { background: #181818; padding: 30px; border-radius: 20px; border: 2px solid #444; text-align: center; width: 300px; }
        .modal input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: 1px solid #444; background: #222; color: white; box-sizing: border-box; }
        .modal button { background: #2ecc71; border: none; padding: 10px 20px; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; }

        .leaderboard-list { text-align: left; margin-top: 15px; max-height: 300px; overflow-y: auto; }
        .lb-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #333; }
        .lb-item.me { color: #f1c40f; font-weight: bold; }
        /* ------------------------------------------- */

        .hud { background: #111; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; width: 340px; border: 2px solid #444; }
        .stats { font-size: 36px; color: #ffd700; font-weight: bold; }
        .luck-meter { font-size: 14px; color: #aaa; margin-top: 5px; }
        
        #click-button { 
            width: 170px; height: 170px; border-radius: 50%; border: none; 
            background: radial-gradient(circle, #2ecc71, #27ae60); 
            color: white; font-size: 24px; font-weight: bold; cursor: pointer; 
            box-shadow: 0 8px #145a32, 0 15px 25px rgba(0,0,0,0.5); 
            transition: 0.05s; margin: 20px 0; outline: none; 
            -webkit-tap-highlight-color: transparent; 
        }
        #click-button:active { transform: translateY(4px); box-shadow: 0 2px #145a32; }

        .shop { text-align: center; margin-bottom: 30px; }
        .chest-btn { padding: 15px 30px; background: #e67e22; border: none; color: white; cursor: pointer; border-radius: 10px; font-size: 18px; font-weight: bold; box-shadow: 0 5px #a04000; transition: 0.3s; }
        .chest-btn:disabled { background: #333; opacity: 0.5; box-shadow: none; cursor: not-allowed; }
        
        #log { margin-top: 15px; color: #00ffcc; font-weight: bold; height: 24px; text-transform: uppercase; }

        .inventory { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; width: 100%; }
        .card { width: 170px; background: #181818; border-radius: 12px; border: 3px solid #333; overflow: hidden; position: relative; animation: pop 0.3s ease-out; }
        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .card-img { width: 100%; height: 120px; object-fit: cover; background: #222; }
        .card-info { padding: 10px; text-align: center; }
        .card-name { font-size: 13px; font-weight: bold; height: 35px; display: flex; align-items: center; justify-content: center; }
        .card-mult { font-size: 24px; font-weight: bold; color: #00ffcc; margin: 5px 0; }
        .card-desc { font-size: 11px; color: #888; height: 45px; line-height: 1.2; display: flex; align-items: center; justify-content: center; }
        
        .negative { color: #ff4d4d !important; }
        .del-btn { width: 100%; padding: 8px; border: none; cursor: pointer; font-weight: bold; font-size: 10px; margin-top: 10px; }
        .del-free { background: #34495e; color: white; }
        .del-paid { background: #c0392b; color: white; }

        .mythic { border-color: #ff00ff; box-shadow: 0 0 15px rgba(255, 0, 255, 0.6); animation: mythicPulse 2s infinite; }
        .legendary { border-color: #f1c40f; box-shadow: 0 0 10px rgba(241, 196, 15, 0.4); }
        .epic { border-color: #9b59b6; }
        .rare { border-color: #3498db; }
        .common { border-color: #7f8c8d; }
        
        @keyframes mythicPulse { 0% { box-shadow: 0 0 5px #ff00ff; } 50% { box-shadow: 0 0 20px #ff00ff; } 100% { box-shadow: 0 0 5px #ff00ff; } }
        
        .floating-amt { position: fixed; pointer-events: none; color: #ffd700; font-weight: bold; font-size: 28px; animation: fly 0.8s forwards; z-index: 1000; }
        @keyframes fly { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>

    <div id="user-info">Игрок: <span id="user-display">---</span></div>
    <button id="leaderboard-btn" onclick="toggleLeaderboard()">🏆 ЛИДЕРЫ</button>

    <div id="reg-modal" class="modal" style="display: flex;">
        <div class="modal-content">
            <h2>РЕГИСТРАЦИЯ</h2>
            <p>Введи свой никнейм:</p>
            <input type="text" id="nickname-input" placeholder="Твой ник..." maxlength="12">
            <button onclick="register()">ИГРАТЬ</button>
        </div>
    </div>

    <div id="lb-modal" class="modal" onclick="toggleLeaderboard()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2>ТОП ИГРОКОВ</h2>
            <div class="leaderboard-list" id="lb-list">
                </div>
            <br>
            <button onclick="toggleLeaderboard()">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div class="hud">
        <div class="stats"><span id="coins">0</span> 💰</div>
        <div style="color:#00ffcc">Множитель: x<span id="mult">1.00</span></div>
        <div class="luck-meter" id="luck-status">Загрузка удачи...</div>
    </div>
    
    <button id="click-button">КЛИК!</button>

    <div class="shop">
        <button class="chest-btn" id="chest-btn" onclick="buyChest()">СУНДУК (50 💰)</button>
        <div id="log">ПОГНАЛИ!</div>
    </div>

    <div class="inventory" id="inventory"></div>

    <script>
        // --- СИСТЕМА АККАУНТОВ ---
        let currentUser = localStorage.getItem('fcu_current_user') || "";
        let coins = 0;
        let characters = [];
        let multiplier = 1.0;

        function register() {
            const input = document.getElementById('nickname-input').value.trim();
            if (input.length < 2) return alert("Ник слишком короткий!");
            currentUser = input;
            localStorage.setItem('fcu_current_user', currentUser);
            document.getElementById('reg-modal').style.display = 'none';
            loadUserData();
        }

        function loadUserData() {
            if (!currentUser) return;
            document.getElementById('user-display').innerText = currentUser;
            document.getElementById('reg-modal').style.display = 'none';
            
            coins = parseFloat(localStorage.getItem(`fcu_coins_${currentUser}`)) || 0;
            characters = JSON.parse(localStorage.getItem(`fcu_chars_${currentUser}`)) || [];
            
            calculatePower();
            updateUI();
        }

        function save() {
            if (!currentUser) return;
            localStorage.setItem(`fcu_coins_${currentUser}`, coins);
            localStorage.setItem(`fcu_chars_${currentUser}`, JSON.stringify(characters));
        }

        function toggleLeaderboard() {
            const modal = document.getElementById('lb-modal');
            const isVisible = modal.style.display === 'flex';
            modal.style.display = isVisible ? 'none' : 'flex';
            if (!isVisible) updateLeaderboard();
        }

        function updateLeaderboard() {
            const lbList = document.getElementById('lb-list');
            // Фейковые игроки для массовки + ты
            const fakePlayers = [
                {name: "Max_Pro", coins: 150000},
                {name: "Nazar_King", coins: 85000},
                {name: "Gleb_Evil", coins: 12000},
                {name: currentUser, coins: Math.floor(coins), me: true}
            ].sort((a, b) => b.coins - a.coins);

            lbList.innerHTML = fakePlayers.map((p, i) => `
                <div class="lb-item ${p.me ? 'me' : ''}">
                    <span>${i+1}. ${p.name}</span>
                    <span>${p.coins.toLocaleString()} 💰</span>
                </div>
            `).join('');
        }

        // --- ОСТАЛЬНАЯ ЛОГИКА ИЗ ТВОЕГО СКРИПТА ---
        const SOUNDS = { click: 'click.mp3.mp3', common: 'common.mp3.mp3', rare: 'rare.mp3.mp3', epic: 'epic.mp3.mp3', legendary: 'legendary.mp3.mp3', mythic: 'mythic.mp3.mp3' };
        function playSound(type) { const audio = new Audio(SOUNDS[type] || SOUNDS.click); audio.volume = 0.3; audio.play().catch(e => {}); }

        const POOL = [
            { name: "Максим Романенко", rarity: "legendary", mult: 15.0, desc: "Абсолютный жир! Дает безумный буст.", img: "max.png" },
            { name: "ТЕНЬ МАКСИМА", rarity: "legendary", mult: 0.05, desc: "Нерф: ШАДОУ ГДЕ ПАЧКА?.", img: "shadow.png" },
            { name: "Полина Скрипник", rarity: "epic", mult: 5.0, desc: "Высоко.", img: "polina.png" },
            { name: "Павленко Каролина", rarity: "epic", mult: 0.1, desc: "Нерф: пизда или нормалды?", img: "karolina.png" },
            { name: "Рыженко Артём", rarity: "rare", mult: 2.5, desc: "Любитель потыкать не только на кнопки.", img: "artyom.png" },
            { name: "Чумак Мирослав", rarity: "rare", mult: 1.1, desc: "Небольшой бафф: капитал на уровне его роста.", img: "miroslav.png" },
            { name: "Матвей Бруснецов", rarity: "common", mult: 1.2, desc: "Бонус.", img: "matvey.png" },
            { name: "Негатив Матвей", rarity: "common", mult: 0.8, desc: "Нерф: для баланса", img: "boring.png" },
            { name: "Ренат Мамедов", rarity: "common", mult: 0.9, desc: "Нерф: ibnə", img: "renat.png" },
            { name: "Давид Стариченко", rarity: "mythic", mult: 6.0, desc: "Старый-Молодой", img: "david.png" },
            { name: "Назар Кицюк", rarity: "mythic", mult: 7.0, desc: "Омайгарыбал бейби", img: "nazar.png" },
            { name: "Ваня Пироженко", rarity: "legendary", mult: 16.0, desc: "Ваня жирный говноед, делает пистолет", img: "vanya.png" },
            { name: "Рома ПалаДИЧЬ", rarity: "epic", mult: 3.0, desc: "Кореной житель Палестины", img: "roma.png" },
            { name: "Романенко ГЛЕБ", rarity: "mythic", mult: 0.3, desc: "ру-инет те-бе иг-р-у", img: "romanenkoGleb.png" }
        ];

        const coinEl = document.getElementById('coins');
        const multEl = document.getElementById('mult');
        const invEl = document.getElementById('inventory');
        const logEl = document.getElementById('log');
        const chestBtn = document.getElementById('chest-btn');
        const luckEl = document.getElementById('luck-status');

        function calculatePower() {
            if (characters.length === 0) multiplier = 1.0;
            else multiplier = characters.reduce((acc, h) => acc * h.mult, 1.0);
            if (multiplier < 0.01) multiplier = 0.01;
        }

        function updateUI() {
            coinEl.innerText = Math.floor(coins);
            multEl.innerText = multiplier.toFixed(2);
            const price = 50 + (characters.length * 50);
            chestBtn.innerText = `КУПИТЬ СУНДУК (${price} 💰)`;
            chestBtn.disabled = coins < price;
            const len = characters.length;
            if (len < 3) luckEl.innerText = "Статус: Новичок (Удача +++)";
            else if (len < 6) luckEl.innerText = "Статус: Опытный (Удача средняя)";
            else luckEl.innerText = "Статус: Магнат (Опасно!)";
            renderInv();
        }

        document.getElementById('click-button').onclick = (e) => {
            if(!currentUser) return;
            playSound('click');
            const earn = 1 * multiplier;
            coins += earn;
            showFloat(e.clientX, e.clientY, earn.toFixed(2));
            updateUI();
            save();
        };

        function buyChest() {
            const price = 50 + (characters.length * 50);
            if (coins >= price) { coins -= price; openChest(); updateUI(); }
        }

        function openChest() {
            const teamSize = characters.length;
            const rand = Math.random() * 100;
            let rarity;
            if (teamSize < 3) rarity = rand < 20 ? "common" : rand < 45 ? "rare" : rand < 70 ? "epic" : rand < 84 ? "legendary" : "mythic";
            else if (teamSize < 6) rarity = rand < 50 ? "common" : rand < 75 ? "rare" : rand < 92 ? "epic" : rand < 95 ? "legendary" : "mythic";
            else rarity = rand < 80 ? "common" : rand < 92 ? "rare" : rand < 97 ? "epic" : rand < 98 ? "legendary" : "mythic";
            playSound(rarity);
            const available = POOL.filter(h => h.rarity === rarity);
            let nerfChance = teamSize < 3 ? 0.15 : teamSize < 6 ? 0.40 : 0.65;
            const nerfs = available.filter(h => h.mult < 1);
            const buffs = available.filter(h => h.mult >= 1);
            let hero = (nerfs.length > 0 && buffs.length > 0) ? (Math.random() < nerfChance ? nerfs[Math.floor(Math.random() * nerfs.length)] : buffs[Math.floor(Math.random() * buffs.length)]) : available[Math.floor(Math.random() * available.length)];
            characters.push({ ...hero, instanceId: Date.now() + Math.random() });
            calculatePower();
            showLog(`Выпал: ${hero.name}!`);
            save();
        }

        function removeHero(id, isNerf) {
            const price = isNerf ? Math.max(150, Math.floor(coins * 0.75)) : 0;
            if (coins >= price) {
                coins -= price;
                characters = characters.filter(h => h.instanceId !== id);
                playSound('click');
                calculatePower();
                updateUI();
                save();
            } else { showLog("МАЛО ДЕНЕГ!"); }
        }

        function renderInv() {
            const fPrice = Math.max(150, Math.floor(coins * 0.75));
            invEl.innerHTML = characters.map(h => {
                const isNerf = h.mult < 1;
                return `<div class="card ${h.rarity}">
                    <img src="${h.img}" class="card-img" onerror="this.src='https://via.placeholder.com/150?text=FRIEND'">
                    <div class="card-info">
                        <div class="card-name">${h.name}</div>
                        <div class="card-mult ${isNerf ? 'negative' : ''}">x${h.mult}</div>
                        <div class="card-desc">${h.desc}</div>
                        <button class="del-btn ${isNerf ? 'del-paid' : 'del-free'}" onclick="removeHero(${h.instanceId}, ${isNerf})">${isNerf ? `УВОЛИТЬ (${fPrice} 💰)` : 'ВЫГНАТЬ'}</button>
                    </div>
                </div>`;
            }).join('');
        }

        function showLog(m) { logEl.innerText = m; setTimeout(() => { if(logEl.innerText === m) logEl.innerText = "ПОГНАЛИ!"; }, 3000); }
        function showFloat(x, y, t) {
            const el = document.createElement('div');
            el.className = 'floating-amt'; el.innerText = `+${t}`;
            el.style.left = x + 'px'; el.style.top = y + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        // Инициализация
        if (currentUser) loadUserData();
    </script>
</body>
</html>
